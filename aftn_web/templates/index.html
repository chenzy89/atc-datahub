<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATC AFTN WebHub v26.5.18</title>
<style>
/* ══════════════════════════════════════════════
   Dark Professional Theme
   ══════════════════════════════════════════════ */
:root {
  --bg-page: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2333;
  --bg-input: #0d1117;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-green: #3fb950;
  --accent-orange: #d29922;
  --accent-red: #f85149;
  --accent-purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Roboto, sans-serif; background: var(--bg-page); color: var(--text-primary); font-size: 14px; }

/* ── header ── */
.header { background: linear-gradient(135deg, #161b22 0%, #1c2333 100%); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
.header .badge { font-size: 11px; background: var(--accent); color: #fff; padding: 2px 10px; border-radius: 10px; font-weight: 500; }

/* ── tabs ── */
.tabs { display: flex; gap: 0; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0 16px; }
.tab-btn { padding: 12px 24px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: .15s; }
.tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: transparent; }

/* ── panels ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── stats ── */
.stats { display: flex; gap: 8px; padding: 12px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.stat-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 10px 18px; text-align: center; min-width: 80px; }
.stat-card .num { font-size: 20px; font-weight: 700; color: var(--text-primary); }
.stat-card .label { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* ── search ── */
.search-bar { padding: 14px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); }
.search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
.search-row label { display: flex; flex-direction: column; gap: 3px; }
.search-row label span { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.search-row input, .search-row select {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
  background: var(--bg-input); color: var(--text-primary); min-width: 110px; outline: none;
}
.search-row input::placeholder { color: var(--text-muted); }
.search-row input:focus, .search-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,.15); }
.search-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── buttons ── */
.btn { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: .15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4c96e8; }
.btn-secondary { background: #21262d; color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: #30363d; }
.btn-green { background: var(--accent-green); color: #fff; }
.btn-green:hover { background: #36a44a; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── table ── */
.table-wrap { overflow-x: auto; background: var(--bg-card); max-height: 60vh; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #1c2333; padding: 9px 12px; text-align: left; font-weight: 600;
  color: var(--text-secondary); border-bottom: 2px solid var(--border); white-space: nowrap;
  position: sticky; top: 0; z-index: 1; font-size: 12px; text-transform: uppercase; letter-spacing: .3px;
}
tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr:hover { background: var(--bg-hover); }
.tag { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.tag-FPL { background: rgba(88,166,255,.15); color: var(--accent); }
.tag-DEP { background: rgba(63,185,80,.15); color: var(--accent-green); }
.tag-ARR { background: rgba(210,153,34,.15); color: var(--accent-orange); }
.tag-DLA { background: rgba(248,81,73,.15); color: var(--accent-red); }
.tag-MANUAL { background: rgba(188,140,255,.15); color: var(--accent-purple); }
.tag-EST { background: rgba(139,148,158,.2); color: var(--text-secondary); }
.tag-CPL { background: rgba(139,148,158,.2); color: var(--text-secondary); }
.tag- { background: rgba(139,148,158,.15); color: var(--text-muted); }
.text-muted { color: var(--text-muted); font-size: 12px; }
.text-center { text-align: center; }
.callsign { font-weight: 600; color: var(--accent); }
.airport { color: var(--accent-orange); font-family: monospace; }

/* ── pagination ── */
.pagination { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border-top: 1px solid var(--border); }
.pagination-info { font-size: 12px; color: var(--text-muted); }
.pagination-btns { display: flex; gap: 6px; }

/* ── result info ── */
.result-info { font-size: 12px; color: var(--text-muted); padding: 6px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); }

/* ── loading / error ── */
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
.error-msg { color: var(--accent-red); padding: 20px; text-align: center; font-size: 14px; }

/* ── no select ── */
select option { background: var(--bg-card); color: var(--text-primary); }

/* ── 数据统计 ── */
.st-apt-group { display:flex; gap:6px; flex-wrap:wrap; padding:2px 0; }
.st-apt-tag { display:inline-flex; align-items:center; gap:3px; cursor:pointer; background:var(--bg-input); border:1px solid var(--border); border-radius:5px; padding:4px 10px; font-size:13px; color:var(--text-secondary); transition:.12s; user-select:none; }
.st-apt-tag input { display:none; }
.st-apt-tag:has(input:checked) { background:rgba(88,166,255,.15); border-color:var(--accent); color:var(--accent); }
.st-apt-tag:hover { border-color:var(--accent); }
.st-date-group { display:flex; align-items:center; gap:4px; }
.st-date-sel { padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:13px; background:var(--bg-input); color:var(--text-primary); outline:none; cursor:pointer; min-width:70px; }
.st-date-sel:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(88,166,255,.15); }

/* ── responsive ── */
@media (max-width: 768px) {
  .search-row label { width: 100%; }
  .search-row input, .search-row select { width: 100%; }
  .stats { gap: 4px; }
  .stat-card { min-width: 60px; padding: 6px 10px; }
  .stat-card .num { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🛩 ATC AFTN WebHub</h1>
  <span class="badge">v26.5.18</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('msgs')">AFTN 报文</button>
  <button class="tab-btn" onclick="switchTab('plans')">飞行计划</button>
  <button class="tab-btn" onclick="switchTab('stats')">数据统计</button>
</div>

<!-- ════════════════════════════════════════════════════════
     Tab 1: AFTN 报文
     ════════════════════════════════════════════════════════ -->
<div class="panel active" id="panel-msgs">
  <div class="stats" id="stats-aftn"></div>

  <div class="search-bar">
    <div class="search-row">
      <label><span>报文类型</span>
        <select id="qmt">
          <option value="">全部</option>
          <option value="FPL">FPL</option>
          <option value="DEP">DEP</option>
          <option value="ARR">ARR</option>
          <option value="DLA">DLA</option>
          <option value="CNL">CNL</option>
          <option value="EST">EST</option>
          <option value="HQ">HQ</option>
          <option value="METAR">METAR</option>
          <option value="CPL">CPL</option>
          <option value="AOC">AOC</option>
          <option value="ACP">ACP</option>
          <option value="TOC">TOC</option>
          <option value="CHG">CHG</option>
          <option value="__OTHER__">其他</option>
        </select>
      </label>
      <label><span>关键词</span><input id="qmk" placeholder="报文内容"></label>
      <label><span>起始日期</span><input id="qmf" type="date"></label>
      <label><span>截止日期</span><input id="qmt2" type="date"></label>
    </div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="searchMsgs()">🔍 查询</button>
      <button class="btn btn-secondary" onclick="resetMsgs()">重置</button>
      <span id="msg-info" class="text-muted" style="margin-left:8px;"></span>
    </div>
  </div>

  <div class="result-info" id="msg-info2"></div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>类型</th><th>接收时间</th><th>发报地址</th><th>报文内容</th><th>操作</th>
      </tr></thead>
      <tbody id="tbl-msgs"><tr><td colspan="6" class="loading">输入条件后按查询</td></tr></tbody>
    </table>
  </div>

  <div class="pagination" id="pg-msgs" style="display:none">
    <div class="pagination-info" id="pi-msg"></div>
    <div class="pagination-btns">
      <button class="btn btn-secondary btn-sm" onclick="goMsgPage(-1)" id="bmp">← 上一页</button>
      <button class="btn btn-secondary btn-sm" onclick="goMsgPage(1)" id="bmn">下一页 →</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     Tab 2: 飞行计划
     ════════════════════════════════════════════════════════ -->
<div class="panel" id="panel-plans">
  <div class="stats" id="stats-fpl"></div>

  <div class="search-bar">
    <div class="search-row">
      <label><span>航班号</span><input id="qfc" placeholder="CSN101"></label>
      <label><span>起飞地</span><input id="qfa" placeholder="ZGOW" maxlength="4"></label>
      <label><span>目的地</span><input id="qfd" placeholder="ZGGG" maxlength="4"></label>
      <label><span>DOF</span><input id="qfd2" type="date"></label>
      <label><span>关注机场</span>
        <select id="qair">
          <option value="">全部</option>
          <option value="ZGSZ">ZGSZ</option>
          <option value="ZGSD">ZGSD</option>
          <option value="VMMC">VMMC</option>
          <option value="ZGNT">ZGNT</option>
          <option value="ZGHZ">ZGHZ</option>
          <option value="ZGUH">ZGUH</option>
        </select>
      </label>
      <label><span>航路</span><input id="qfr" placeholder="含关键词"></label>
      <label><span>规则</span>
        <select id="qfr2">
          <option value="">全部</option>
          <option value="IS">IS</option>
          <option value="IN">IN</option>
          <option value="IG">IG</option>
          <option value="IM">IM</option>
          <option value="IX">IX</option>
          <option value="IB">IB</option>
          <option value="VS">VS</option>
          <option value="VN">VN</option>
          <option value="VG">VG</option>
          <option value="VX">VX</option>
          <option value="__OTHER__">其他</option>
        </select>
      </label>
      <label><span>移交点</span>
        <select id="qhp">
          <option value="">全部</option>
          <option value="SAREX">SAREX</option>
          <option value="OVGOT">OVGOT</option>
          <option value="LOVTA">LOVTA</option>
          <option value="LANDA">LANDA</option>
          <option value="IDUMA">IDUMA</option>
          <option value="MIPAG">MIPAG</option>
          <option value="SIERA">SIERA</option>
          <option value="TOMUD">TOMUD</option>
          <option value="INDUS">INDUS</option>
          <option value="SULAS">SULAS</option>
          <option value="__OTHER__">其它</option>
        </select>
      </label>
    </div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="searchPlans()">🔍 查询</button>
      <button class="btn btn-secondary" onclick="resetPlans()">重置</button>
      <button class="btn btn-secondary" onclick="exportExcel()">导出</button>
      <span id="fpl-info" class="text-muted" style="margin-left:6px;"></span>
    </div>
  </div>

  <div class="result-info" id="fpl-info2"></div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>航班号</th><th>规则</th><th>移交点</th><th>机型</th><th>DOF</th>
        <th>起飞地</th><th>ETD</th><th>ATD</th>
        <th>目的地</th><th>ETA</th><th>ATA</th>
        <th>航路</th><th>报文</th>
      </tr></thead>
      <tbody id="tbl-fpl"><tr><td colspan="12" class="loading">输入条件后按查询</td></tr></tbody>
    </table>
  </div>

  <div class="pagination" id="pg-fpl" style="display:none">
    <div class="pagination-info" id="pi-fpl"></div>
    <div class="pagination-btns">
      <button class="btn btn-secondary btn-sm" onclick="goFplPage(-1)" id="bfp">← 上一页</button>
      <button class="btn btn-secondary btn-sm" onclick="goFplPage(1)" id="bfn">下一页 →</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     Tab 3: 数据统计
     ════════════════════════════════════════════════════════ -->
<div class="panel" id="panel-stats">
  <div class="search-bar">
    <div class="search-row">
      <label><span>机场（勾选）</span>
        <div class="st-apt-group">
          <label class="st-apt-tag"><input type="checkbox" class="st-airport" value="ZGSZ" checked><span>ZGSZ 深圳</span></label>
          <label class="st-apt-tag"><input type="checkbox" class="st-airport" value="ZGSD" checked><span>ZGSD 珠海</span></label>
          <label class="st-apt-tag"><input type="checkbox" class="st-airport" value="VMMC" checked><span>VMMC 澳门</span></label>
          <label class="st-apt-tag"><input type="checkbox" class="st-airport" value="ZGNT" checked><span>ZGNT 南头</span></label>
          <label class="st-apt-tag"><input type="checkbox" class="st-airport" value="ZGUH" checked><span>ZGUH 九洲</span></label>
          <label class="st-apt-tag"><input type="checkbox" class="st-airport" value="ZGHZ" checked><span>ZGHZ 惠州</span></label>
        </div>
      </label>
    </div>
    <div class="search-row" style="align-items:end;">
      <label><span>起始日期</span>
        <div class="st-date-group">
          <select id="st-yf" class="st-date-sel"></select>
          <span style="color:var(--text-muted);font-size:13px;">年</span>
          <select id="st-mf" class="st-date-sel"></select>
          <span style="color:var(--text-muted);font-size:13px;">月</span>
          <select id="st-df" class="st-date-sel"></select>
          <span style="color:var(--text-muted);font-size:13px;">日</span>
        </div>
      </label>
      <label><span>截止日期</span>
        <div class="st-date-group">
          <select id="st-yt" class="st-date-sel"></select>
          <span style="color:var(--text-muted);font-size:13px;">年</span>
          <select id="st-mt" class="st-date-sel"></select>
          <span style="color:var(--text-muted);font-size:13px;">月</span>
          <select id="st-dt" class="st-date-sel"></select>
          <span style="color:var(--text-muted);font-size:13px;">日</span>
        </div>
      </label>
    </div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="generateStats()">🔍 查询</button>
      <span id="st-info" class="text-muted" style="margin-left:8px;"></span>
    </div>
  </div>

  <div id="st-result" style="padding: 12px; display: none;">
    <div style="max-width:960px;margin:0 auto;">
      <div id="st-summary" style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;"></div>

      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;overflow-x:auto;margin-bottom:16px;">
        <h3 style="font-size:14px;font-weight:600;margin:12px 12px 8px;color:var(--text-primary);">🕐 24小时流量分布（架次）</h3>
        <table id="st-hourly-tbl" style="width:100%;border-collapse:collapse;font-size:12px;min-width:700px;">
          <thead><tr id="st-hourly-head"></tr></thead>
          <tbody id="st-hourly-body"></tbody>
        </table>
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:16px;">
        <div style="flex:1;min-width:300px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text-primary);">进港移交点（日均架次）</h3>
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="background:#1c2333;"><th style="padding:7px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">移交点</th><th style="padding:7px 10px;text-align:right;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">总架次</th><th style="padding:7px 10px;text-align:right;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">日均</th><th style="padding:7px 10px;text-align:right;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">占比</th></tr></thead>
            <tbody id="st-arr-tbl"></tbody>
          </table>
        </div>
        <div style="flex:1;min-width:300px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text-primary);">出港移交点（日均架次）</h3>
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="background:#1c2333;"><th style="padding:7px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">移交点</th><th style="padding:7px 10px;text-align:right;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">总架次</th><th style="padding:7px 10px;text-align:right;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">日均</th><th style="padding:7px 10px;text-align:right;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);">占比</th></tr></thead>
            <tbody id="st-dep-tbl"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── AFTN 报文详情弹窗 ── -->
<div id="modal-msg" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:transparent;z-index:1100;align-items:center;justify-content:center;" onclick="if(event.target===this)closeMsg()">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;max-width:900px;width:92%;max-height:85vh;overflow-y:auto;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="font-size:16px;font-weight:600;">AFTN 原始报文</h2>
      <button onclick="closeMsg()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;">&times;</button>
    </div>
    <div id="msg-body"></div>
  </div>
</div>

<!-- ── 飞行计划关联报文弹窗 ── -->
<div id="modal-fpl-msg" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:flex-start;justify-content:center;padding-top:40px;" onclick="if(event.target===this)closeFplMsg()">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;max-width:900px;width:92%;max-height:85vh;overflow-y:auto;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 id="fpl-msg-title" style="font-size:15px;font-weight:600;">关联报文</h2>
      <button onclick="closeFplMsg()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;">&times;</button>
    </div>
    <div id="fpl-msg-info" style="font-size:12px;color:var(--text-muted);margin-bottom:10px;"></div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr>
        <th style="background:#1c2333;padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;font-size:12px;">类型</th>
        <th style="background:#1c2333;padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;font-size:12px;">接收时间</th>
        <th style="background:#1c2333;padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;font-size:12px;">发报地址</th>
        <th style="background:#1c2333;padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;font-size:12px;">报文内容</th>
        <th style="background:#1c2333;padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;font-size:12px;">操作</th>
      </tr></thead>
      <tbody id="tbl-fpl-msg"><tr><td colspan="5" class="loading">查询中...</td></tr></tbody>
    </table>
    <div id="fpl-msg-empty" style="display:none;text-align:center;padding:30px;color:var(--text-muted);font-size:14px;">未找到关联报文</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════
var msgOff = 0, msgTot = 0, fplOff = 0, fplTot = 0;
var PS = 100;

// ═══════════════════════════════════════════════════════
// Tabs
// ═══════════════════════════════════════════════════════
function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var btns = document.querySelectorAll('.tab-btn');
  var idx = {'msgs':0, 'plans':1, 'stats':2}[n] || 0;
  btns[idx].classList.add('active');
  document.getElementById('panel-'+n).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// Load Stats
// ═══════════════════════════════════════════════════════
loadStats();

function loadStats() {
  fetch('/api/stats').then(function(r) { return r.json(); }).then(function(s) {
    var f = s.flight_plans_by_type || {};
    var m = s.aftn_messages_by_type || {};
    document.getElementById('stats-fpl').innerHTML =
      '<div class="stat-card"><div class="num">' + (s.total_flight_plans||0) + '</div><div class="label">飞行计划</div></div>' +
      '<div class="stat-card"><div class="num">' + (f.FPL||0) + '</div><div class="label">FPL</div></div>' +
      '<div class="stat-card"><div class="num">' + (f.DEP||0) + '</div><div class="label">DEP</div></div>' +
      '<div class="stat-card"><div class="num">' + (f.ARR||0) + '</div><div class="label">ARR</div></div>' +
      '<div class="stat-card"><div class="num">' + (f.DLA||0) + '</div><div class="label">DLA</div></div>';
    document.getElementById('stats-aftn').innerHTML =
      '<div class="stat-card"><div class="num">' + (s.total_aftn_messages||0) + '</div><div class="label">AFTN 报文</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.FPL||0) + '</div><div class="label">FPL</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.DEP||0) + '</div><div class="label">DEP</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.ARR||0) + '</div><div class="label">ARR</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.DLA||0) + '</div><div class="label">DLA</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.EST||0) + '</div><div class="label">EST</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.HQ||0) + '</div><div class="label">HQ</div></div>' +
      '<div class="stat-card"><div class="num">' + (m.METAR||0) + '</div><div class="label">METAR</div></div>';
  }).catch(function() {});
}

// ═══════════════════════════════════════════════════════
// AFTN Messages
// ═══════════════════════════════════════════════════════
function searchMsgs(r) {
  if (r !== false) { msgOff = 0; }
  var p = new URLSearchParams({limit: PS, offset: msgOff});
  var t = document.getElementById('qmt').value;
  var k = document.getElementById('qmk').value.trim();
  var f = document.getElementById('qmf').value;
  var t2 = document.getElementById('qmt2').value;
  if (t) { p.set('message_type', t); }
  if (k) { p.set('keyword', k); }
  if (f) { p.set('date_from', f); }
  if (t2) { p.set('date_to', t2); }

  document.getElementById('tbl-msgs').innerHTML = '<tr><td colspan="6" class="loading">查询中...</td></tr>';
  fetch('/api/aftn_messages?' + p.toString()).then(function(r) { return r.json(); }).then(function(d) {
    msgTot = d.total;
    renderMsgs(d.records);
    var pi = document.getElementById('msg-info');
    if (pi) { pi.textContent = '共 ' + d.total + ' 条'; }
    pgMsg();
  }).catch(function(e) {
    document.getElementById('tbl-msgs').innerHTML = '<tr><td colspan="6" class="error-msg">查询失败: ' + e.message + '</td></tr>';
  });
}

function renderMsgs(rs) {
  var tb = document.getElementById('tbl-msgs');
  if (!rs || rs.length === 0) {
    tb.innerHTML = '<tr><td colspan="6" class="text-muted text-center" style="padding:30px">没有匹配的报文</td></tr>';
    return;
  }
  var h = '';
  for (var i = 0; i < rs.length; i++) {
    var r = rs[i];
    var tc = 'tag-' + (r.message_type || ' ');
    var rt = r.received_at ? r.received_at.slice(5, 16) : '-';
    var sender = r.sender_address || '-';
    var preview = (r.message_text || r.raw_text || '').slice(0, 80);
    h += '<tr>' +
      '<td>' + r.id + '</td>' +
      '<td><span class="tag ' + tc + '">' + (r.message_type || '?') + '</span></td>' +
      '<td>' + rt + '</td>' +
      '<td style="font-family:monospace;color:var(--accent-purple)">' + sender + '</td>' +
      '<td style="max-width:450px;overflow:hidden;text-overflow:ellipsis;font-family:monospace;font-size:12px;color:var(--text-secondary)" title="' + esc(preview) + '">' + esc(preview) + '</td>' +
      '<td><button class="btn btn-secondary btn-sm" onclick="showMsg(' + r.id + ')">查看</button></td>' +
      '</tr>';
  }
  tb.innerHTML = h;
}

function pgMsg() {
  var el = document.getElementById('pg-msgs');
  var info = document.getElementById('pi-msg');
  if (msgTot <= PS) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  var pg = Math.floor(msgOff / PS) + 1;
  info.textContent = '第 ' + pg + '/' + Math.ceil(msgTot / PS) + ' 页（共 ' + msgTot + ' 条）';
  document.getElementById('bmp').disabled = msgOff <= 0;
  document.getElementById('bmn').disabled = msgOff + PS >= msgTot;
}

function goMsgPage(d) {
  var n = msgOff + d * PS;
  if (n < 0 || n >= msgTot) { return; }
  msgOff = n;
  searchMsgs(false);
}

function resetMsgs() {
  document.querySelectorAll('#panel-msgs input, #panel-msgs select').forEach(function(e) { e.value = ''; });
  msgOff = 0; msgTot = 0;
  document.getElementById('tbl-msgs').innerHTML = '<tr><td colspan="6" class="loading">输入条件后按查询</td></tr>';
  document.getElementById('pg-msgs').style.display = 'none';
  document.getElementById('msg-info').textContent = '';
}

function showMsg(id) {
  fetch('/api/aftn_messages/' + id).then(function(r) {
    if (!r.ok) { throw new Error('找不到报文 (id=' + id + ')'); }
    return r.json();
  }).then(function(rec) {
    document.getElementById('msg-body').innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">' +
        '<div><div style="font-size:11px;color:var(--text-muted)">ID</div><div style="padding:4px 0">' + rec.id + '</div></div>' +
        '<div><div style="font-size:11px;color:var(--text-muted)">报文类型</div><div style="padding:4px 0"><span class="tag tag-' + (rec.message_type||' ') + '">' + (rec.message_type||'?') + '</span></div></div>' +
        '<div><div style="font-size:11px;color:var(--text-muted)">接收时间</div><div style="padding:4px 0">' + (rec.received_at||'-') + '</div></div>' +
        '<div><div style="font-size:11px;color:var(--text-muted)">发报地址</div><div style="padding:4px 0;font-family:monospace;color:var(--accent-purple)">' + (rec.sender_address||'-') + '</div></div>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">原始报文</div>' +
      '<pre style="background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:12px;font-size:12px;overflow-x:auto;max-height:200px;white-space:pre-wrap;word-break:break-all;color:var(--text-primary);">' + esc(rec.raw_text||'(无)') + '</pre>';
    document.getElementById('modal-msg').style.display = 'flex';
  }).catch(function(e) {
    alert('查询失败: ' + e.message);
  });
}

function closeMsg() {
  document.getElementById('modal-msg').style.display = 'none';
}

function closeFplMsg() {
  document.getElementById('modal-fpl-msg').style.display = 'none';
}

function showFplMsg(callsign, dof) {
  if (!callsign) { return; }
  document.getElementById('fpl-msg-title').textContent = callsign + ' 关联报文';
  document.getElementById('tbl-fpl-msg').innerHTML = '<tr><td colspan="5" class="loading">查询中...</td></tr>';
  document.getElementById('fpl-msg-empty').style.display = 'none';
  document.getElementById('fpl-msg-info').textContent = '';
  document.getElementById('modal-fpl-msg').style.display = 'flex';

  // ±2 天日期范围
  var from = '', to = '';
  if (dof) {
    var d = new Date(dof);
    if (!isNaN(d.getTime())) {
      var df = new Date(d);
      df.setDate(df.getDate() - 2);
      from = df.toISOString().slice(0, 10);
      var dt = new Date(d);
      dt.setDate(dt.getDate() + 2);
      to = dt.toISOString().slice(0, 10);
    }
  }
  document.getElementById('fpl-msg-info').textContent =
    '日期范围: ' + (from || '不限') + ' ~ ' + (to || '不限');

  var p = new URLSearchParams({limit: 500, keyword: callsign});
  if (from) { p.set('date_from', from); }
  if (to) { p.set('date_to', to); }

  fetch('/api/aftn_messages?' + p.toString()).then(function(r) { return r.json(); }).then(function(d) {
    var tb = document.getElementById('tbl-fpl-msg');
    if (!d.records || d.records.length === 0) {
      tb.innerHTML = '';
      document.getElementById('fpl-msg-empty').style.display = 'block';
      return;
    }
    var h = '';
    for (var i = 0; i < d.records.length; i++) {
      var rec = d.records[i];
      var tc = rec.message_type ? 'tag-' + rec.message_type : 'tag-';
      var preview = (rec.message_text || rec.raw_text || '').slice(0, 60);
      h += '<tr>' +
        '<td><span class="tag ' + tc + '">' + (rec.message_type || '?') + '</span></td>' +
        '<td>' + (rec.received_at ? rec.received_at.slice(0, 16) : '-') + '</td>' +
        '<td style="font-family:monospace;color:var(--accent-purple);font-size:12px;">' + (rec.sender_address||'-') + '</td>' +
        '<td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);font-size:12px;" title="' + esc(rec.raw_text || '') + '">' + esc(preview) + '</td>' +
        '<td><button class="btn btn-secondary btn-sm" onclick="showMsg(' + rec.id + ')">查看</button></td>' +
        '</tr>';
    }
    tb.innerHTML = h;
  }).catch(function(e) {
    document.getElementById('tbl-fpl-msg').innerHTML = '<tr><td colspan="5" class="error-msg">查询失败: ' + e.message + '</td></tr>';
  });
}

// ═══════════════════════════════════════════════════════
// Flight Plans
// ═══════════════════════════════════════════════════════
function searchPlans(r) {
  if (r !== false) { fplOff = 0; }
  var p = new URLSearchParams({limit: PS, offset: fplOff});
  var v = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var c = v('qfc'); var a = v('qfa'); var d = v('qfd'); var air = v('qair'); var fr = v('qfr'); var fr2 = v('qfr2'); var hp = v('qhp');
  if (c) { p.set('callsign', c); }
  if (a) { p.set('adep', a); }
  if (v('qfd')) { p.set('adest', v('qfd')); }
  if (v('qfd2')) { p.set('dof', v('qfd2')); }
  if (air) { p.set('airport', air); }
  if (fr) { p.set('route', fr); }
  if (fr2) { p.set('flight_rule', fr2); }
  if (hp) { p.set('handover_pt', hp); }

  document.getElementById('tbl-fpl').innerHTML = '<tr><td colspan="13" class="loading">查询中...</td></tr>';
  fetch('/api/flight_plans?' + p.toString()).then(function(r) { return r.json(); }).then(function(d) {
    fplTot = d.total;
    renderPlans(d.records);
    var pi = document.getElementById('fpl-info');
    if (pi) { pi.textContent = '共 ' + d.total + ' 条'; }
    pgFpl();
  }).catch(function(e) {
    document.getElementById('tbl-fpl').innerHTML = '<tr><td colspan="12" class="error-msg">查询失败: ' + e.message + '</td></tr>';
  });
}

function renderPlans(rs) {
  var tb = document.getElementById('tbl-fpl');
  if (!rs || rs.length === 0) {
    tb.innerHTML = '<tr><td colspan="13" class="text-muted text-center" style="padding:30px">没有匹配的飞行计划</td></tr>';
    return;
  }
  var h = '';
  for (var i = 0; i < rs.length; i++) {
    var r = rs[i];
    var fd = r.dof ? r.dof.slice(0,10) : '-';
    var ft = function(v) { return v ? v.slice(5,16) : '-'; };
    var rt = r.route ? (r.route.length > 30 ? r.route.slice(0,30) + '...' : r.route) : '-';
    var msgTypes = r.message_types ? r.message_types.split(',') : [];
    var msgTagsHtml = '';
    for (var j = 0; j < msgTypes.length; j++) {
      var mt = msgTypes[j].trim();
      if (!mt) continue;
      var mtc = 'tag-' + mt;
      msgTagsHtml += '<span class="tag ' + mtc + '" style="cursor:pointer;margin-right:3px;" onclick="showFplMsg(\'' + esc(r.callsign||'') + '\',\'' + (r.dof||'').slice(0,10) + '\')" title="查看该计划的两天内所有报文">' + mt + '</span>';
    }
    h += '<tr>' +
      '<td class="callsign">' + (r.callsign||'-') + '</td>' +
      '<td>' + (r.flight_rule||'-') + '</td>' +
      '<td>' + (r.handover_pt||'-') + '</td>' +
      '<td>' + (r.aircraft_type||'-') + '</td>' +
      '<td>' + fd + '</td>' +
      '<td class="airport">' + (r.adep||'-') + '</td>' +
      '<td>' + ft(r.etd) + '</td>' +
      '<td>' + ft(r.atd) + '</td>' +
      '<td class="airport">' + (r.adest||'-') + '</td>' +
      '<td>' + ft(r.eta) + '</td>' +
      '<td>' + ft(r.ata) + '</td>' +
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;color:var(--text-secondary)" title="' + esc(r.route||'') + '">' + rt + '</td>' +
      '<td>' + msgTagsHtml + '</td>' +
      '</tr>';
  }
  tb.innerHTML = h;
}

function pgFpl() {
  var el = document.getElementById('pg-fpl');
  var info = document.getElementById('pi-fpl');
  if (fplTot <= PS) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  var pg = Math.floor(fplOff / PS) + 1;
  info.textContent = '第 ' + pg + '/' + Math.ceil(fplTot / PS) + ' 页（共 ' + fplTot + ' 条）';
  document.getElementById('bfp').disabled = fplOff <= 0;
  document.getElementById('bfn').disabled = fplOff + PS >= fplTot;
}

function goFplPage(d) {
  var n = fplOff + d * PS;
  if (n < 0 || n >= fplTot) { return; }
  fplOff = n;
  searchPlans(false);
}

function resetPlans() {
  document.querySelectorAll('#panel-plans input, #panel-plans select').forEach(function(e) { e.value = ''; });
  fplOff = 0; fplTot = 0;
  document.getElementById('tbl-fpl').innerHTML = '<tr><td colspan="13" class="loading">输入条件后按查询</td></tr>';
  document.getElementById('pg-fpl').style.display = 'none';
  document.getElementById('fpl-info').textContent = '';
}

// ═══════════════════════════════════════════════════════
// Export Excel
// ═══════════════════════════════════════════════════════
function exportExcel() {
  var params = new URLSearchParams({limit: 10000, offset: 0});
  var v = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var c = v('qfc'); var a = v('qfa'); var s = v('qfs'); var ac = v('qfac'); var fr2 = v('qfr2'); var hp = v('qhp');
  if (c) { params.set('callsign', c); }
  if (a) { params.set('adep', a); }
  if (v('qfd')) { params.set('dof', v('qfd')); }
  if (v('qfd2')) { params.set('dof', v('qfd2')); }
  if (s) { params.set('ssr', s); }
  if (ac) { params.set('aircraft_type', ac); }
  if (fr2) { params.set('flight_rule', fr2); }
  if (hp) { params.set('handover_pt', hp); }
  window.location.href = '/api/flight_plans/export?' + params.toString();
}

// ═══════════════════════════════════════════════════════
// 数据统计
// ═══════════════════════════════════════════════════════

// 初始化日期下拉框
function initDateSelects() {
  var now = new Date();
  var y = now.getFullYear();
  function fill(id, arr) {
    var sel = document.getElementById(id);
    if (!sel) return;
    // 已有选项则不重复填充
    if (sel.options.length > 0) return;
    for (var i = 0; i < arr.length; i++) {
      var o = document.createElement('option');
      o.value = arr[i]; o.textContent = arr[i];
      sel.appendChild(o);
    }
  }
  var years = [];
  for (var i = y - 1; i <= y + 1; i++) years.push(i);
  fill('st-yf', years); fill('st-yt', years);
  var months = [];
  for (var i = 1; i <= 12; i++) months.push(i);
  fill('st-mf', months); fill('st-mt', months);
  var days = [];
  for (var i = 1; i <= 31; i++) days.push(i);
  fill('st-df', days); fill('st-dt', days);
  // 默认昨天~今天
  var yd = new Date(now); yd.setDate(yd.getDate() - 1);
  document.getElementById('st-yf').value = yd.getFullYear();
  document.getElementById('st-mf').value = yd.getMonth() + 1;
  document.getElementById('st-df').value = yd.getDate();
  document.getElementById('st-yt').value = y;
  document.getElementById('st-mt').value = now.getMonth() + 1;
  document.getElementById('st-dt').value = now.getDate();
}

function getDateStr(prefix) {
  var y = document.getElementById('st-y' + prefix).value;
  var m = String(document.getElementById('st-m' + prefix).value).padStart(2, '0');
  var d = String(document.getElementById('st-d' + prefix).value).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

function generateStats() {
  var aps = [];
  document.querySelectorAll('.st-airport:checked').forEach(function(cb) { aps.push(cb.value); });
  if (aps.length === 0) { alert('请至少勾选一个机场'); return; }
  var df = getDateStr('f');
  var dt = getDateStr('t');
  if (!df || !dt) { alert('请选择起止日期'); return; }
  if (df > dt) { alert('起始日期不能晚于截止日期'); return; }

  document.getElementById('st-info').textContent = '查询中...';
  var url = '/api/statistics?airports=' + aps.join(',') + '&date_from=' + df + '&date_to=' + dt;
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    renderStats(d, aps, df, dt);
    document.getElementById('st-info').textContent = '✅ 统计完成';
  }).catch(function(e) {
    document.getElementById('st-info').textContent = '❌ 查询失败: ' + e;
  });
}

function renderStats(d, aps, df, dt) {
  var days = d.days || 1;
  var depAvg = (d.dep_count / days).toFixed(0);
  var arrAvg = (d.arr_count / days).toFixed(0);

  var peakHour = d.peak_hour || 0;
  var peakDep = d.peak_hour_dep || 0;
  var peakArr = d.peak_hour_arr || 0;
  var peakTotal = peakDep + peakArr;
  var peakDayStr = (d.peak_day || '').replace(/^\d{4}-(\d{2})-(\d{2})$/, '$1-$2');
  var peakDayCount = d.peak_day_count || 0;

  var resultEl = document.getElementById('st-result');
  resultEl.style.display = 'block';

  document.getElementById('st-summary').innerHTML =
    '<div class="stat-card"><div class="num">' + depAvg + '</div><div class="label">日均出港</div></div>' +
    '<div class="stat-card"><div class="num">' + arrAvg + '</div><div class="label">日均进港</div></div>' +
    '<div class="stat-card"><div class="num">' + peakTotal + '</div><div class="label">高峰小时架次</div></div>' +
    '<div class="stat-card"><div class="num">' + peakDayStr + ' ' + String(peakHour).padStart(2,'0') + '时</div><div class="label">高峰时段</div></div>' +
    '<div class="stat-card"><div class="num">' + peakDayCount + '</div><div class="label">高峰日架次</div></div>' +
    '<div class="stat-card"><div class="num">' + aps.join(', ') + '</div><div class="label">机场</div></div>' +
    '<div class="stat-card"><div class="num">' + df + ' ~ ' + dt + '</div><div class="label">日期范围</div></div>';

  // ── 24小时流量表（小时平均）──
  var depH = (d.dep_hourly || []).map(function(v){ return (v / days).toFixed(0); });
  var arrH = (d.arr_hourly || []).map(function(v){ return (v / days).toFixed(0); });
  var totalH = depH.map(function(v,i){ return (parseFloat(v) + parseFloat(arrH[i])).toFixed(0); });

  // 表头
  var headHTML = '<tr><th style="padding:6px 8px;background:#1c2333;color:var(--text-secondary);border-bottom:2px solid var(--border);font-weight:600;position:sticky;left:0;background:#1c2333;z-index:1;">类型</th>';
  for (var h = 0; h < 24; h++) {
    headHTML += '<th style="padding:6px 4px;text-align:center;border-bottom:2px solid var(--border);' + (h === peakHour ? 'background:#1c2d3f;' : '') + '">' + h + '时</th>';
  }
  headHTML += '<th style="padding:6px 8px;text-align:center;border-bottom:2px solid var(--border);background:#1c2333;color:var(--text-secondary);">日均架次</th></tr>';
  document.getElementById('st-hourly-head').innerHTML = headHTML;

  function hourlyRow(label, data, isTotal) {
    var row = '<tr><td style="padding:5px 8px;border-bottom:1px solid var(--border);' + (isTotal ? 'background:#1c2333;' : '') + 'color:var(--text-primary);font-weight:' + (isTotal ? '600' : '400') + ';position:sticky;left:0;z-index:1;">' + label + '</td>';
    for (var h = 0; h < 24; h++) {
      var v = data[h] || '0';
      var cellStyle = h === peakHour ? 'background:#1c2d3f;color:var(--accent);font-weight:600;' : 'color:var(--text-secondary);';
      row += '<td style="padding:5px 4px;text-align:center;border-bottom:1px solid var(--border);' + cellStyle + '">' + v + '</td>';
    }
    var avgDaily = isTotal
      ? ((d.dep_count + d.arr_count) / days).toFixed(0)
      : (label === '进港' ? (d.arr_count / days).toFixed(0) : (d.dep_count / days).toFixed(0));
    row += '<td style="padding:5px 8px;text-align:center;border-bottom:1px solid var(--border);color:var(--text-primary);' + (isTotal ? 'background:#1c2333;' : '') + 'font-weight:600;">' + avgDaily + '</td></tr>';
    return row;
  }

  document.getElementById('st-hourly-body').innerHTML =
    hourlyRow('进港', arrH, false) +
    hourlyRow('出港', depH, false) +
    hourlyRow('进出港', totalH, true);

  function buildHandoverRows(handoverDict, totalCount) {
    var entries = Object.entries(handoverDict || {}).sort(function(a,b){ return b[1]-a[1]; });
    var rows = '';
    entries.forEach(function(e) {
      var hp = e[0];
      var total = e[1];
      var daily = (total / days).toFixed(0);
      var pct = totalCount > 0 ? (total / totalCount * 100).toFixed(1) + '%' : '-';
      rows += '<tr>' +
        '<td style="padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text-primary);font-weight:500;">' + hp + '</td>' +
        '<td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text-secondary);">' + total + '</td>' +
        '<td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text-secondary);">' + daily + '</td>' +
        '<td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text-secondary);">' + pct + '</td>' +
      '</tr>';
    });
    return rows;
  }

  var arrTotal = d.arr_count || 0;
  var depTotal = d.dep_count || 0;
  document.getElementById('st-arr-tbl').innerHTML = buildHandoverRows(d.arr_handover, arrTotal);
  document.getElementById('st-dep-tbl').innerHTML = buildHandoverRows(d.dep_handover, depTotal);
}

// 初始化日期选择
initDateSelects();

// ── utility ──
function esc(s) {
  if (!s) { return ''; }
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

</script>
